trigger:
  branches:
    include:
      - main
  paths:
    include:
      - frontend/**   # only triggers when frontend code changes

pool:
  vmImage: 'ubuntu-latest'

variables:
  NODE_VERSION: '20'
  AZURE_SERVICE_CONNECTION: 'ado-2-azure'
  SWA_NAME: 'orgchat'
  SWA_RESOURCE_GROUP: 'kaseya-orgchat'

stages:
  - stage: Build
    displayName: 'Build Frontend'
    jobs:
      - job: BuildAngular
        displayName: 'Install & Build Angular App'
        steps:
          - task: NodeTool@0
            displayName: 'Setup Node.js $(NODE_VERSION)'
            inputs:
              versionSpec: '$(NODE_VERSION)'

          - task: Npm@1
            displayName: 'Install dependencies'
            inputs:
              command: ci
              workingDir: 'frontend'

          - task: Npm@1
            displayName: 'Build Angular (production)'
            inputs:
              command: custom
              workingDir: 'frontend'
              customCommand: 'run build -- --configuration production'

          - task: PublishPipelineArtifact@1
            displayName: 'Publish build artifact'
            inputs:
              targetPath: 'frontend/www'
              artifact: 'frontend-dist'

  - stage: Deploy
    displayName: 'Deploy to Azure Static Web Apps'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - deployment: DeployFrontend
        displayName: 'Deploy Frontend'
        environment: 'Dev'
        strategy:
          runOnce:
            deploy:
              steps:
                
                - task: DownloadPipelineArtifact@2
                  displayName: 'Download build artifact'
                  inputs:
                    artifact: 'frontend-dist'
                    path: '$(Pipeline.Workspace)/frontend-dist'

                - task: AzureCLI@2
                  displayName: 'Fetch SWA deployment token'
                  name: GetToken
                  inputs:
                    azureSubscription: '$(AZURE_SERVICE_CONNECTION)'
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      TOKEN=$(az staticwebapp secrets list \
                        --name $(SWA_NAME) \
                        --resource-group $(SWA_RESOURCE_GROUP) \
                        --query "properties.apiKey" -o tsv)
                      echo "##vso[task.setvariable variable=SWA_TOKEN;issecret=true]$TOKEN"

                - task: AzureStaticWebApp@0
                  displayName: 'Deploy to Azure Static Web Apps'
                  inputs:
                    app_location: '$(Pipeline.Workspace)/frontend-dist' ## Deployment jobs don't checkout the repo — artifact is auto-downloaded here
                    output_location: '' # Artifact already contains the built www contents directly, no subfolder needed
                    skip_api_build: true
                    azure_static_web_apps_api_token: $(SWA_TOKEN)
