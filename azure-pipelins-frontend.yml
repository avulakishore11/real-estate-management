trigger:
  branches:
    include:
      - main                  # run pipeline only on pushes to main branch
  paths:
    include:
      - frontend/**           # only triggers when frontend code changes, ignores backend changes

pool:
  vmImage: 'ubuntu-latest'   # use Microsoft-hosted Ubuntu agent

variables:
  NODE_VERSION: '20'                          # Node.js version used to build the Angular app
  AZURE_SERVICE_CONNECTION: 'ado-2-azure'     # Azure DevOps service connection name linked to your service principal
  SWA_NAME: 'orgchat'                         # name of your Azure Static Web App resource
  SWA_RESOURCE_GROUP: 'kaseya-orgchat'        # resource group where the Static Web App lives

stages:
  - stage: Build
    displayName: 'Build Frontend'
    jobs:
      - job: BuildAngular
        displayName: 'Install & Build Angular App'
        steps:
          - task: NodeTool@0
            displayName: 'Setup Node.js $(NODE_VERSION)'
            inputs:
              versionSpec: '$(NODE_VERSION)'  # installs the specified Node.js version on the agent

          - task: Npm@1
            displayName: 'Install dependencies'
            inputs:
              command: ci                     # clean install using package-lock.json — faster and deterministic
              workingDir: 'frontend'          # run npm ci inside the frontend folder

          - task: Npm@1
            displayName: 'Build Angular (production)'
            inputs:
              command: custom
              workingDir: 'frontend'          # run the build command inside the frontend folder
              customCommand: 'run build -- --configuration production'  # production build: minified, optimized, AOT compiled

          - task: PublishPipelineArtifact@1
            displayName: 'Publish build artifact'
            inputs:
              targetPath: 'frontend/www'      # Angular output folder (defined in angular.json as outputPath)
              artifact: 'frontend-dist'       # artifact name used to reference it in the Deploy stage

  - stage: Deploy
    displayName: 'Deploy to Azure Static Web Apps'
    dependsOn: Build                          # only runs after Build stage succeeds
    condition: succeeded()                    # skip deploy if build failed
    jobs:
      - job: DeployFrontend
        displayName: 'Deploy Frontend'
        steps:
          - checkout: none                    # no need to checkout source code — we use the published artifact instead

          - task: DownloadPipelineArtifact@2
            displayName: 'Download build artifact'
            inputs:
              artifact: 'frontend-dist'                                         # must match the artifact name published in Build stage
              path: '$(System.DefaultWorkingDirectory)/frontend-dist'           # download into working dir so AzureStaticWebApp task can find it via relative path

          - task: AzureCLI@2
            displayName: 'Fetch SWA deployment token'
            name: GetToken
            inputs:
              azureSubscription: '$(AZURE_SERVICE_CONNECTION)'   # uses the service principal to authenticate to Azure
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                TOKEN=$(az staticwebapp secrets list \
                  --name $(SWA_NAME) \
                  --resource-group $(SWA_RESOURCE_GROUP) \
                  --query "properties.apiKey" -o tsv)            # fetches the SWA deployment token dynamically — no need to store it manually
                echo "##vso[task.setvariable variable=SWA_TOKEN;issecret=true]$TOKEN"   # saves token as a secret pipeline variable, masked in logs

          - task: AzureStaticWebApp@0
            displayName: 'Deploy to Azure Static Web Apps'
            inputs:
              app_location: 'frontend-dist'   # relative path inside working dir — maps to /working_dir/frontend-dist inside the deploy container
              output_location: ''             # empty because artifact already contains the final built files, no subfolder needed
              skip_api_build: true            # no Azure Functions backend — skip API build step
              azure_static_web_apps_api_token: $(SWA_TOKEN)    # token fetched dynamically in the previous step
